<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO USER ポータル | ROOT競輪</title>
<meta name="robots" content="noindex, nofollow">
<style>
:root{
  --blue:#1f6feb;--dark:#0d1117;--dark2:#161b22;--dark3:#21262d;
  --border:#30363d;--text:#c9d1d9;--text-dim:#8b949e;--green:#3fb950;
  --yellow:#e3b341;--red:#f85149;--gold:#d4a017;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Hiragino Sans","Meiryo",sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--dark2);border:1px solid var(--border);border-radius:14px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.login-box .icon{text-align:center;font-size:2.8rem;margin-bottom:12px;}
.login-box h1{text-align:center;font-size:1.15rem;font-weight:bold;color:#f0f6fc;margin-bottom:4px;}
.login-box p{text-align:center;font-size:.75rem;color:var(--text-dim);margin-bottom:24px;}
label{display:block;font-size:.78rem;font-weight:bold;color:var(--text-dim);margin-bottom:5px;}
input[type="text"],input[type="password"]{width:100%;padding:11px 14px;background:#0d1117;border:1px solid var(--border);border-radius:8px;color:#f0f6fc;font-size:.9rem;outline:none;transition:border-color .2s;font-family:inherit;}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(31,111,235,.15);}
.form-group{margin-bottom:16px;}
.btn-login{width:100%;background:linear-gradient(135deg,#1f6feb,#0047AB);color:#fff;border:none;padding:13px;border-radius:8px;font-size:.95rem;font-weight:bold;cursor:pointer;transition:opacity .2s;}
.btn-login:hover{opacity:.88;}
.btn-login:disabled{background:var(--dark3);color:var(--text-dim);cursor:not-allowed;}
.error-msg{background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.4);color:var(--red);border-radius:6px;padding:10px 12px;font-size:.8rem;margin-top:12px;display:none;text-align:center;}
.error-msg.show{display:block;}

/* ── Top bar ── */
.topbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-weight:bold;font-size:.95rem;display:flex;align-items:center;gap:8px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.btn-sm{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:.78rem;font-weight:bold;}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{background:var(--dark3);}
.btn-danger{background:var(--red);color:#fff;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:#388bfd;}
.btn-success{background:var(--green);color:#000;}

/* ── Layout ── */
.content{max-width:720px;margin:0 auto;padding:20px 16px;}

/* ── Profile card ── */
.profile-card{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.profile-avatar-wrap{position:relative;flex-shrink:0;}
.profile-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);}
.profile-avatar-default{width:72px;height:72px;border-radius:50%;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#555;border:3px solid var(--border);}
.avatar-edit-btn{position:absolute;bottom:0;right:0;width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;border:none;cursor:pointer;font-size:.65rem;display:flex;align-items:center;justify-content:center;}
.profile-info{flex:1;}
.profile-name{font-size:1.1rem;font-weight:900;}
.profile-handle{font-size:.78rem;color:var(--text-dim);margin-top:2px;}
.profile-grade{display:inline-block;background:rgba(212,160,23,.2);color:var(--gold);padding:2px 10px;border-radius:10px;font-size:.72rem;font-weight:bold;margin-top:6px;}
.profile-stats{display:flex;gap:20px;margin-top:10px;flex-wrap:wrap;}
.stat-item{text-align:center;}
.stat-val{font-size:1.1rem;font-weight:900;color:#58a6ff;}
.stat-label{font-size:.65rem;color:var(--text-dim);margin-top:1px;}
.readonly-badge{font-size:.58rem;background:rgba(255,255,255,.08);color:var(--text-dim);padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle;}

/* ── Section ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:.92rem;font-weight:bold;}
.pred-card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.pred-card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.pred-race-tag{font-size:.7rem;background:var(--dark3);padding:2px 8px;border-radius:6px;color:var(--text-dim);}
.pred-picks{font-size:.82rem;margin-top:4px;}
.pred-picks strong{color:var(--yellow);}
.pred-pt{font-weight:bold;color:var(--yellow);font-size:.85rem;}
.pred-text-preview{font-size:.78rem;color:var(--text-dim);line-height:1.6;margin-top:6px;}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--dark2);border:1px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:1rem;font-weight:bold;margin-bottom:16px;}
.field-label{display:block;font-size:.75rem;font-weight:bold;color:var(--text-dim);margin-bottom:5px;}
textarea,select{width:100%;padding:9px 12px;background:#0d1117;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;outline:none;font-family:inherit;resize:vertical;}
textarea:focus,select:focus{border-color:var(--blue);}
.fg{margin-bottom:12px;}
.readonly-field{background:#0d1117;border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:9px 12px;font-size:.85rem;color:var(--text-dim);}
.form-row{display:flex;gap:10px;}
.form-row .fc{flex:1;}

/* ── Grade system ── */
.grade-section{background:var(--dark2);border:1px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden;}
.grade-section-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.grade-section-head:hover{background:var(--dark3);}
.grade-table{width:100%;border-collapse:collapse;font-size:.75rem;}
.grade-table th{background:var(--dark3);padding:8px 10px;color:var(--text-dim);font-weight:bold;border-bottom:1px solid var(--border);text-align:left;}
.grade-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;line-height:1.55;}
.grade-table tr.current-grade td{background:rgba(212,160,23,.08);border-left:3px solid var(--gold);}
.grade-table tr.current-grade td:first-child{padding-left:7px;}
.grade-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-weight:bold;font-size:.72rem;}
.gb-s{background:rgba(212,160,23,.25);color:var(--gold);}
.gb-a{background:rgba(31,111,235,.2);color:#58a6ff;}
.gb-b{background:rgba(63,185,80,.18);color:#3fb950;}
.gb-shin{background:rgba(139,148,158,.18);color:#8b949e;}
.rate-val{font-weight:bold;color:#e3b341;font-size:.85rem;}
.cond-up{color:#3fb950;font-size:.72rem;}
.cond-down{color:#f85149;font-size:.72rem;}
.progress-bar-wrap{margin-top:10px;padding:10px 16px 14px;border-top:1px solid rgba(255,255,255,.06);}
.progress-label{font-size:.72rem;color:var(--text-dim);margin-bottom:5px;}
.progress-bar{height:6px;border-radius:6px;background:var(--dark3);overflow:hidden;}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#e3b341,#f0a500);transition:width .4s;}

/* ── Tabs ── */
.tab-nav{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--dark2);padding:0 18px;}
.tab-btn{background:none;border:none;border-bottom:3px solid transparent;color:var(--text-dim);padding:11px 20px;font-size:.83rem;font-weight:bold;cursor:pointer;transition:color .2s,border-color .2s;font-family:inherit;white-space:nowrap;}
.tab-btn.active{color:#58a6ff;border-bottom-color:#58a6ff;}
.tab-btn:hover:not(.active){color:var(--text);}

/* ── Cash screen ── */
.cash-balance-card{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--border);border-radius:14px;padding:22px 20px;margin-bottom:18px;position:relative;overflow:hidden;}
.cash-balance-card::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(31,111,235,.08);border-radius:50%;}
.cash-balance-label{font-size:.72rem;color:var(--text-dim);margin-bottom:4px;}
.cash-balance-val{font-size:2.4rem;font-weight:900;color:#58a6ff;letter-spacing:-1px;line-height:1;}
.cash-balance-unit{font-size:.88rem;color:var(--text-dim);margin-left:6px;}
.cash-meta-row{display:flex;gap:0;margin-top:16px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.06);padding-top:14px;}
.cash-meta-item{flex:1;min-width:120px;padding:0 12px;border-right:1px solid rgba(255,255,255,.06);}
.cash-meta-item:first-child{padding-left:0;}
.cash-meta-item:last-child{border-right:none;}
.cash-meta-label{font-size:.68rem;color:var(--text-dim);margin-bottom:3px;}
.cash-meta-val{font-size:.95rem;font-weight:bold;}
.cash-warning{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);border-radius:8px;padding:10px 14px;font-size:.78rem;margin-bottom:16px;line-height:1.7;}
.cash-form-card{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px;}
.cash-form-title{font-size:.9rem;font-weight:bold;margin-bottom:14px;}
.cash-req-card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.cash-req-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.cash-req-info{font-size:.75rem;color:var(--text-dim);margin-top:6px;line-height:1.7;}
.cash-req-status{display:inline-block;padding:3px 11px;border-radius:10px;font-size:.72rem;font-weight:bold;}
.st-pending{background:rgba(227,179,65,.18);color:#e3b341;}
.st-approved{background:rgba(31,111,235,.2);color:#58a6ff;}
.st-completed{background:rgba(63,185,80,.18);color:#3fb950;}
.st-rejected{background:rgba(248,81,73,.15);color:#f85149;}
.min-note{font-size:.7rem;color:var(--text-dim);margin-top:5px;}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;padding:12px 20px;border-radius:8px;font-size:.85rem;font-weight:bold;z-index:999;display:none;box-shadow:0 4px 16px rgba(0,0,0,.4);}
.toast.show{display:block;animation:tSlide .3s ease;}
@keyframes tSlide{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="icon">🏆</div>
    <h1>PRO USER ポータル</h1>
    <p>ROOT競輪 認定予想師専用</p>
    <div class="form-group">
      <label>ハンドル名（ログインID）</label>
      <input type="text" id="pu-login-handle" placeholder="@handle" autocomplete="off">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="pu-login-pw" placeholder="パスワードを入力">
    </div>
    <button class="btn-login" id="btn-pu-login" onclick="doProUserLogin()">ログイン</button>
    <div class="error-msg" id="pu-error-msg">ハンドルまたはパスワードが正しくありません</div>
    <div style="margin-top:20px;text-align:center;font-size:.72rem;color:var(--text-dim);">
      <a href="index.html" style="color:#58a6ff;text-decoration:none;">← サイトTOPに戻る</a>
    </div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard" style="display:none;">
  <div class="topbar">
    <div class="topbar-title">🏆 PRO USER ポータル</div>
    <div class="topbar-right">
      <a href="index.html" target="_blank" class="btn-sm btn-outline">サイトを見る</a>
      <button class="btn-sm btn-danger" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <!-- タブナビ -->
  <div class="tab-nav">
    <button class="tab-btn active" id="tab-btn-home" onclick="showTab('home')">📝 ダッシュボード</button>
    <button class="tab-btn" id="tab-btn-cash" onclick="showTab('cash')">💰 キャッシュ</button>
  </div>

  <!-- ダッシュボードタブ -->
  <div class="content" id="tab-home">
    <div class="profile-card" id="profile-card"></div>
    <div id="grade-system-section"></div>
    <div class="section-header">
      <div class="section-title">📝 自分の投稿予想</div>
      <button class="btn-sm btn-primary" onclick="openPostModal(null, -1)">＋ 新規投稿</button>
    </div>
    <div id="my-pred-list"></div>
  </div>

  <!-- キャッシュタブ -->
  <div class="content" id="tab-cash" style="display:none;">
    <div id="cash-screen"></div>
  </div>
</div>

<!-- Post/Edit Modal -->
<div class="modal-bg" id="post-modal" style="display:none;"></div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/common.js"></script>
<script>
/* ── ユーティリティ ── */
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'success' ? '#3fb950' : '#f85149';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 認証 ── */
async function doProUserLogin() {
  const handle = document.getElementById('pu-login-handle').value.trim();
  const pw     = document.getElementById('pu-login-pw').value;
  const errEl  = document.getElementById('pu-error-msg');
  errEl.classList.remove('show');
  if (!handle || !pw) { errEl.classList.add('show'); return; }
  const btn = document.getElementById('btn-pu-login');
  btn.disabled = true; btn.textContent = '認証中...';
  const ok = await RK.proUserLogin(handle, pw);
  btn.disabled = false; btn.textContent = 'ログイン';
  if (!ok) { errEl.classList.add('show'); return; }
  showDashboard();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doProUserLogin();
});
function doLogout() {
  RK.proUserLogout();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

/* ── ダッシュボード ── */
function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  renderProfile();
  renderGradeSystem();
  renderMyPredictions();
}
function getMe() { return RK.getLoggedInProUser(); }

function renderProfile() {
  const me = getMe();
  if (!me) return;
  const avatarHtml = me.avatarImg
    ? `<img src="${me.avatarImg}" class="profile-avatar">`
    : `<div class="profile-avatar-default">👤</div>`;
  document.getElementById('profile-card').innerHTML = `
    <div class="profile-avatar-wrap">
      ${avatarHtml}
      <button class="avatar-edit-btn" title="画像を変更" onclick="document.getElementById('pu-avatar-file').click()">✏</button>
      <input type="file" id="pu-avatar-file" accept="image/*" style="display:none;" onchange="onAvatarChange(this)">
    </div>
    <div class="profile-info">
      <div class="profile-name">${esc(me.userName)}</div>
      <div class="profile-handle">${esc(me.handle)}</div>
      <div class="profile-grade">${esc(me.grade)}</div>
      <div class="profile-stats">
        <div class="stat-item">
          <div class="stat-val">${(me.winRate||0).toFixed(1)}%</div>
          <div class="stat-label">週間回収率 <span class="readonly-badge">管理者設定</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-val">${me.postCount||0}</div>
          <div class="stat-label">投稿数 <span class="readonly-badge">自動集計</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-val" style="color:#e3b341;">${RK.calcMonthSales(me.id, me.handle).toLocaleString()} pt</div>
          <div class="stat-label">${new Date().getMonth()+1}月の売上</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" style="color:#3fb950;">${RK.calcMonthRevenue(me.id, me.handle).toLocaleString()} pt</div>
          <div class="stat-label">${new Date().getMonth()+1}月の還元pt</div>
        </div>
      </div>
    </div>`;
}

const GRADE_SYSTEM = [
  {
    key:'S級 PRO USER', badge:'gb-s', label:'S級',
    ratePaid: 90, rateGrant: 60,
    upCond: null,
    downCond: '月間売上 100,000pt 未満 → A級へ降格'
  },
  {
    key:'A級 PRO USER', badge:'gb-a', label:'A級',
    ratePaid: 85, rateGrant: 55,
    upCond: '月間売上 100,000pt 以上 → S級へ昇格',
    downCond: '月間売上 10,000pt 未満 → B級へ降格'
  },
  {
    key:'B級 PRO USER', badge:'gb-b', label:'B級',
    ratePaid: 80, rateGrant: 50,
    upCond: '月間売上 10,000pt 以上 → A級へ昇格',
    downCond: '毎月30投稿未満 または 月間売上 0pt → PRO除外'
  },
  {
    key:'新人 PRO USER', badge:'gb-shin', label:'新人',
    ratePaid: 70, rateGrant: 40,
    upCond: '累計 100投稿 以上 → B級へ昇格',
    downCond: '毎月30投稿未満 または 月間売上 0pt → PRO除外'
  }
];
function renderGradeSystem() {
  const me = getMe();
  if (!me) return;
  const monthSales = RK.calcMonthSales(me.id, me.handle);
  const postCount  = me.postCount || 0;
  const currentKey = me.grade;
  const el = document.getElementById('grade-system-section');

  /* 進捗バー計算 */
  let progressHtml = '';
  if (currentKey === '新人 PRO USER') {
    const pct = Math.min(100, Math.round(postCount / 100 * 100));
    progressHtml = `<div class="progress-bar-wrap">
      <div class="progress-label">昇格進捗 — 累計投稿数 ${postCount} / 100件（B級昇格まで）</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div>
    </div>`;
  } else if (currentKey === 'B級 PRO USER') {
    const pct = Math.min(100, Math.round(monthSales / 10000 * 100));
    progressHtml = `<div class="progress-bar-wrap">
      <div class="progress-label">今月の昇格進捗 — ${monthSales.toLocaleString()}pt / 10,000pt（A級昇格まで）</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div>
    </div>`;
  } else if (currentKey === 'A級 PRO USER') {
    const pct = Math.min(100, Math.round(monthSales / 100000 * 100));
    progressHtml = `<div class="progress-bar-wrap">
      <div class="progress-label">今月の昇格進捗 — ${monthSales.toLocaleString()}pt / 100,000pt（S級昇格まで）</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div>
    </div>`;
  } else if (currentKey === 'S級 PRO USER') {
    const pct = Math.min(100, Math.round(monthSales / 100000 * 100));
    const color = monthSales >= 100000 ? '#3fb950' : '#f85149';
    progressHtml = `<div class="progress-bar-wrap">
      <div class="progress-label" style="color:${color};">維持進捗 — 今月 ${monthSales.toLocaleString()}pt / 100,000pt（維持条件）</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color};"></div></div>
    </div>`;
  }

  const rows = GRADE_SYSTEM.map(g => {
    const isCurrent = g.key === currentKey;
    return `<tr class="${isCurrent ? 'current-grade' : ''}">
      <td><span class="grade-badge ${g.badge}">${g.label}</span>${isCurrent ? ' ◀ 現在' : ''}</td>
      <td style="text-align:center;"><span class="rate-val">${g.ratePaid}%</span></td>
      <td style="text-align:center;"><span class="rate-val" style="color:#f0a500;">${g.rateGrant}%</span></td>
      <td><span class="cond-up">${g.upCond ? '▲ ' + g.upCond : '—'}</span></td>
      <td><span class="cond-down">▼ ${g.downCond}</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `<div class="grade-section">

function onAvatarChange(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const size = Math.min(img.width, img.height);
      ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 128, 128);
      const b64 = canvas.toDataURL('image/jpeg', 0.85);
      /* PRO USERレジストリに保存 */
      const list = RK.getRKProUsers();
      const id = sessionStorage.getItem('rk_puId');
      const idx = list.findIndex(p => p.id === id);
      if (idx !== -1) { list[idx].avatarImg = b64; RK.saveRKProUsers(list); }
      renderProfile();
      toast('✓ プロフィール画像を更新しました');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function openPostModal(raceId, predIdx) {
  const me = getMe();
  if (!me) return;
  const data = RK.getData();
  const races = data.races || {};
  const isNew = predIdx === -1 || raceId === null;
  const pred = (!isNew && races[raceId]) ? (races[raceId].userPredictions || [])[predIdx] : null;

  /* 編集時: 1回制限チェック → 警告ポップアップ */

function saveMyPrediction(origRaceId, predIdx) {
  const me = getMe();
  if (!me) return;
  const selectedRaceId = document.getElementById('pm-race').value;
  const teaser  = document.getElementById('pm-teaser').value;
  const text    = document.getElementById('pm-text').value;
  const picks   = document.getElementById('pm-picks').value;
  const price   = parseInt(document.getElementById('pm-price').value) || 0;
  if (price > 50000) { toast('購入価格の上限は 50,000pt です', 'error'); return; }
  if (!text.trim()) { toast('予想テキストを入力してください', 'error'); return; }
  const data = RK.getData();
  if (!data.races[selectedRaceId]) { toast('レースが見つかりません', 'error'); return; }
  const isNew = predIdx === -1 || !origRaceId;
  /* 1レース1投稿チェック（新規投稿 または レース変更時のみ） */
  if (isNew || origRaceId !== selectedRaceId) {
    const already = (data.races[selectedRaceId]?.userPredictions || []).some(
      p => p.proUserId === me.id || p.handle === me.handle
    );
    if (already) { toast('このレースにはすでに投稿しています（1レース1投稿まで）', 'error'); return; }
  }
  const entry = {
    id: isNew ? ('up_' + Date.now()) : ((data.races[origRaceId]?.userPredictions||[])[predIdx]?.id || 'up_'+Date.now()),
    proUserId:  me.id,
    userName:   me.userName,
    handle:     me.handle,
    grade:      me.grade,
    winRate:    me.winRate || 100,
    postCount:  me.postCount || 0,
    avatarImg:  me.avatarImg || null,
    likes:      isNew ? 0 : ((data.races[origRaceId]?.userPredictions||[])[predIdx]?.likes || 0),
    editCount:  isNew ? 0 : ((data.races[origRaceId]?.userPredictions||[])[predIdx]?.editCount || 0) + 1,
    editHistory: (() => {
      if (isNew) return [];
      const prev = (data.races[origRaceId]?.userPredictions||[])[predIdx] || {};
      const history = prev.editHistory ? [...prev.editHistory] : [];
      history.push({
        editedAt: new Date().toISOString(),
        before: { text: prev.text||'', teaser: prev.teaser||'', picks: prev.picks||'', pointPrice: prev.pointPrice||0 }
      });
      return history;
    })(),
    teaser, text, picks, pointPrice: price
  };
  if (!data.races[selectedRaceId].userPredictions) data.races[selectedRaceId].userPredictions = [];
  if (!isNew && origRaceId === selectedRaceId) {
    data.races[selectedRaceId].userPredictions[predIdx] = entry;
  } else {
    /* 旧レースから削除してから新レースに追加 */
    if (!isNew && origRaceId && origRaceId !== selectedRaceId) {
      data.races[origRaceId].userPredictions = (data.races[origRaceId].userPredictions||[]).filter((_,i)=>i!==predIdx);
    }
    data.races[selectedRaceId].userPredictions.push(entry);
    /* 初回投稿ならpostCountをインクリメント */
    if (isNew) {
      const list = RK.getRKProUsers();
      const idx = list.findIndex(p => p.id === me.id);
      if (idx !== -1) { list[idx].postCount = (list[idx].postCount||0) + 1; RK.saveRKProUsers(list); }
    }
  }
  RK.saveData(data);
  closePostModal();
  renderMyPredictions();
  renderProfile();
  toast('✓ 投稿しました');
}

        <div class="cash-meta-item">
          <div class="cash-meta-label">出金済み</div>
          <div class="cash-meta-val" style="color:var(--text-dim);">${withdrawnPt.toLocaleString()} pt</div>
        </div>
      </div>
    </div>
    ${formHtml}
    <div class="section-header" style="margin-top:8px;">
      <div class="section-title">📋 申請履歴</div>
    </div>
    ${historyHtml}`;
}

function updateWdNote() {
  const avail = parseInt(document.getElementById('wd-pt')?.getAttribute('max') || '0');
  const val   = parseInt(document.getElementById('wd-pt')?.value || '0');
  const el    = document.getElementById('wd-note');
  if (!el) return;
  if (val < 5000) el.style.color = 'var(--red)';
  else if (val > avail) el.style.color = 'var(--red)';
  else el.style.color = 'var(--text-dim)';
}

function submitWithdrawal() {
  const me       = getMe();
  if (!me) return;
  const rate     = GRADE_RATES[me.grade] || 40;
  const totalSales = RK.calcTotalSales(me.id, me.handle);
  const grossCash  = Math.floor(totalSales * rate / 100);
  const allReqs    = RK.getWithdrawalRequests();
  const myReqs     = allReqs.filter(r => r.puId === me.id || r.handle === me.handle);
  const withdrawnPt= myReqs.filter(r => r.status === 'completed').reduce((s,r) => s+(r.requestPt||0), 0);
  const available  = Math.max(0, grossCash - withdrawnPt);

  const reqPt    = parseInt(document.getElementById('wd-pt').value) || 0;
  const bankName = document.getElementById('wd-bank').value.trim();
  const branch   = document.getElementById('wd-branch').value.trim();
  const accType  = document.getElementById('wd-type').value;
  const accNum   = document.getElementById('wd-num').value.trim();
  const holder   = document.getElementById('wd-holder').value.trim();

  if (reqPt < 5000)      { toast('最低出金額は 5,000pt です', 'error'); return; }
  if (reqPt > available) { toast('出金可能残高を超えています', 'error'); return; }
  if (!bankName)         { toast('銀行名を入力してください', 'error'); return; }
  if (!branch)           { toast('支店名を入力してください', 'error'); return; }
  if (!accNum)           { toast('口座番号を入力してください', 'error'); return; }
  if (!holder)           { toast('口座名義を入力してください', 'error'); return; }
  if (!/^\d{4,8}$/.test(accNum)) { toast('口座番号は4〜8桁の数字で入力してください', 'error'); return; }

  if (!confirm(`${reqPt.toLocaleString()} pt の出金申請を送信してよろしいですか？`)) return;

  RK.addWithdrawalRequest({
    id:            'wr_' + Date.now(),
    puId:          me.id,
    handle:        me.handle,
    userName:      me.userName,
    grade:         me.grade,
    rate:          rate,
    totalSalesPt:  totalSales,
    grossCashPt:   grossCash,
    requestPt:     reqPt,
    bankName,
    branchName:    branch,
    accountType:   accType,
    accountNumber: accNum,
    accountHolder: holder,
    status:        'pending',
    ts:            new Date().toISOString(),
    processedTs:   null,
    adminNote:     ''
  });
  toast('✓ 出金申請を送信しました');
  renderCashScreen();
}

/* ── 初期化 ── */
if (RK.isProUserLoggedIn()) {
  showDashboard();
} else {
  document.getElementById('login-screen').style.display = 'flex';
}
</script>

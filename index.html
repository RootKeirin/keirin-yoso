<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOT競輪 | 次のレースを逃さない</title>
<style>
:root {
  --main-blue:#0047AB; --sub-dark:#001f4d;
  --accent-yellow:#FFEB3B; --register-orange:#FF9800;
  --hot-red:#ff3b3b; --text-dark:#333; --bg-gray:#f4f7f9;
  --premium-gold:#c8a400; --premium-bg:#fffdf0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Hiragino Sans","Meiryo",sans-serif;background:var(--bg-gray);color:var(--text-dark);line-height:1.4;padding-bottom:70px;}

/* ── Header ── */
header{background:var(--main-blue);color:#fff;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 6px rgba(0,0,0,.25);}
.header-left{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.time-label-group{background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;display:flex;flex-direction:column;}
.time-label{font-size:.5rem;opacity:.8;margin-bottom:-2px;}
.current-time{font-size:.85rem;font-weight:bold;letter-spacing:.05em;}
.refresh-btn{background:#fff;color:var(--main-blue);border:none;border-radius:4px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;font-weight:bold;}
.site-title{font-weight:900;font-size:1.05rem;color:#fff;text-decoration:none;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;letter-spacing:.05em;}
.header-right{display:flex;align-items:center;gap:6px;}
.btn-register{background:var(--register-orange);color:#fff;text-decoration:none;font-size:.65rem;font-weight:bold;padding:8px 6px;border-radius:6px;line-height:1.1;text-align:center;box-shadow:0 2px 4px rgba(0,0,0,.2);}
.login-group{display:flex;flex-direction:column;gap:3px;}
.btn-login{text-decoration:none;font-size:.55rem;font-weight:bold;padding:3px 7px;border-radius:3px;text-align:center;white-space:nowrap;}
.login-normal{color:#fff;border:1px solid rgba(255,255,255,.5);}
.login-premium{color:var(--accent-yellow);border:1px solid var(--accent-yellow);background:rgba(255,235,59,.1);}
.user-name-badge{color:#fff;font-size:.65rem;font-weight:bold;}
.badge-premium-sm{color:var(--accent-yellow);font-size:.55rem;font-weight:bold;border:1px solid var(--accent-yellow);padding:1px 5px;border-radius:3px;background:rgba(255,235,59,.1);}

/* ── Top Nav ── */
.top-nav{background:#fff;border-bottom:2px solid #ddd;display:flex;overflow-x:auto;white-space:nowrap;position:sticky;top:46px;z-index:150;-webkit-overflow-scrolling:touch;}
.top-nav a{flex:0 0 auto;text-align:center;padding:11px 14px;text-decoration:none;color:#666;font-size:.75rem;font-weight:bold;position:relative;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.top-nav a.active{color:var(--main-blue);}
.top-nav a.active::after{content:"";position:absolute;bottom:0;left:15%;right:15%;height:3px;background:var(--main-blue);border-radius:2px 2px 0 0;}
.badge-hot{position:absolute;top:3px;right:3px;background:var(--hot-red);color:#fff;font-size:.45rem;padding:1px 4px;border-radius:8px;animation:pulse 1.5s infinite;}
.badge-new{position:absolute;top:3px;right:3px;background:var(--premium-gold);color:#fff;font-size:.45rem;padding:1px 4px;border-radius:8px;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.12);opacity:.8;}}
.stars{color:#ff9800;font-size:.6rem;}

/* ── Tab panels ── */
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── NEXT RACE cards ── */
.priority-section{padding:14px;}
.card-large{display:block;text-decoration:none;border-radius:16px;padding:22px 18px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,0,0,.18);position:relative;overflow:hidden;color:#fff;}
.card-1{background:linear-gradient(135deg,var(--main-blue) 0%,var(--sub-dark) 100%);}
.card-2{background:linear-gradient(135deg,#1a5fb4 0%,#0a3d7a 100%);}
.next-label{position:absolute;top:0;left:0;background:var(--accent-yellow);color:var(--main-blue);font-size:.7rem;font-weight:900;padding:4px 12px;border-radius:0 0 12px 0;}
.race-name-main{font-size:1.55rem;font-weight:bold;margin-top:10px;display:block;}
.race-sub{font-size:.88rem;opacity:.8;margin-top:4px;display:block;}
.time-limit-main{font-size:1.25rem;font-weight:bold;color:var(--accent-yellow);float:right;margin-top:12px;}
.ai-teaser{margin-top:12px;background:rgba(255,255,255,.12);border-radius:8px;padding:8px 10px;font-size:.78rem;}
.ai-teaser .picks{font-size:1rem;font-weight:bold;color:var(--accent-yellow);}

/* ── その他のレース ── */
.section-title{padding:10px 15px;font-size:.85rem;font-weight:bold;color:#666;display:flex;align-items:center;}
.section-title::after{content:"";flex:1;height:1px;background:#ddd;margin-left:10px;}
.venue-container{padding:0 14px 14px;}
.venue-card{background:#fff;border-radius:12px;margin-bottom:10px;border:1px solid #eee;box-shadow:0 1px 6px rgba(0,0,0,.07);overflow:hidden;}
.venue-card-header{display:flex;align-items:center;padding:12px 14px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.venue-name-badge{background:#eef2f7;color:var(--main-blue);padding:4px 10px;border-radius:6px;font-weight:bold;font-size:.85rem;flex-shrink:0;margin-right:12px;white-space:nowrap;}
.venue-header-info{flex:1;min-width:0;}
.venue-event-name{font-size:.88rem;font-weight:bold;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.venue-grade-label{font-size:.7rem;color:#888;margin-top:2px;}
.venue-toggle-arrow{color:#bbb;font-size:1rem;flex-shrink:0;margin-left:8px;transition:transform .2s;}
.venue-toggle-arrow.open{transform:rotate(90deg);}
.venue-races-list{display:none;border-top:1px solid #f0f0f0;}
.venue-races-list.open{display:block;}
.venue-race-link{display:flex;align-items:center;gap:8px;padding:10px 14px;text-decoration:none;color:inherit;border-bottom:1px solid #f5f5f5;}
.venue-race-link:last-child{border-bottom:none;}
.venue-race-link:active{background:#f8f9ff;}
.venue-race-num{font-weight:900;font-size:.92rem;color:var(--main-blue);min-width:28px;}
.venue-race-cat{flex:1;font-size:.78rem;color:#555;}
.venue-race-deadline{font-size:.72rem;color:#e65100;font-weight:bold;white-space:nowrap;}
.venue-race-arrow{font-size:.85rem;color:#ccc;}

/* ── プレミアムバナー ── */
.premium-banner{margin:0 14px 16px;background:linear-gradient(135deg,#8b6914,#c8a400,#e8c200);border-radius:14px;padding:16px 18px;color:#fff;text-decoration:none;display:block;position:relative;overflow:hidden;box-shadow:0 4px 14px rgba(200,164,0,.35);}
.premium-banner::before{content:"★";position:absolute;right:-10px;top:-20px;font-size:6rem;opacity:.1;}
.premium-banner h3{font-size:1rem;font-weight:900;margin-bottom:6px;}
.premium-banner p{font-size:.78rem;opacity:.95;line-height:1.5;}
.premium-cta{display:inline-block;margin-top:10px;background:#fff;color:var(--premium-gold);font-weight:bold;font-size:.78rem;padding:6px 14px;border-radius:20px;}

/* ── PRO AI 一覧 ── */
.ai-list{padding:14px;}
.ai-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.09);border:1px solid #eee;text-decoration:none;color:inherit;display:block;}
.ai-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ai-title{font-weight:bold;font-size:.9rem;}
.confidence-badge{background:var(--main-blue);color:#fff;font-size:.7rem;padding:3px 8px;border-radius:10px;font-weight:bold;}
.ai-picks-row{background:#f0f5ff;border-radius:8px;padding:10px;text-align:center;margin-bottom:8px;}
.ai-picks-label{font-size:.65rem;color:#666;}
.ai-picks-val{font-size:1.4rem;font-weight:900;color:var(--main-blue);}
.ai-summary{font-size:.8rem;color:#555;}
.premium-lock{text-align:center;padding:20px;background:#fffdf0;border-radius:12px;border:2px dashed var(--premium-gold);margin:14px;}
.premium-lock-icon{font-size:2.5rem;}
.premium-lock h4{color:var(--premium-gold);margin:8px 0 4px;font-size:1rem;}
.premium-lock p{font-size:.78rem;color:#777;margin-bottom:12px;}
.btn-premium{display:inline-block;background:linear-gradient(135deg,#c8a400,#e8c200);color:#fff;font-weight:bold;padding:10px 24px;border-radius:20px;text-decoration:none;font-size:.85rem;}

/* ── PRO USER予想 ── */
.user-pred-list{padding:14px;}
.pro-user-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.pro-user-top h2{font-size:1rem;font-weight:bold;}
.my-point-badge{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:4px 10px;font-size:.72rem;font-weight:bold;color:#c8a400;display:flex;align-items:center;gap:4px;}
.pro-user-what{background:#f0f5ff;border:1px solid #d0dff5;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:.78rem;color:#555;line-height:1.6;}
.pro-user-what strong{color:var(--main-blue);}
.race-group-header{display:flex;align-items:center;gap:8px;margin:16px 0 8px;padding-bottom:6px;border-bottom:2px solid #e0e8f5;}
.race-group-header a{font-weight:bold;font-size:.9rem;color:var(--main-blue);text-decoration:none;}
.race-group-header span{font-size:.72rem;color:#999;}
/* pu-card 共通 */
.pu-card{background:#fff;border-radius:12px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.09);border:1px solid #eee;overflow:hidden;}
.pu-card-head{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:1rem;flex-shrink:0;}
.pu-user-info{flex:1;min-width:0;}
.pu-user-name{font-weight:bold;font-size:.88rem;}
.pu-user-sub{font-size:.65rem;color:#999;margin-top:2px;}
.pu-grade{display:inline-block;background:linear-gradient(135deg,var(--main-blue),#1a5fb4);color:#fff;font-size:.6rem;font-weight:bold;padding:2px 7px;border-radius:8px;margin-left:4px;}
.pu-grade.a{background:linear-gradient(135deg,#2e7d32,#388e3c);}
.pu-price-tag{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;}
.pu-pt{font-size:1rem;font-weight:900;color:var(--premium-gold);}
.pu-pt-label{font-size:.6rem;color:#aaa;}
/* ロック状態 */
.pu-body-locked{padding:0 14px 14px;}
.pu-teaser{font-size:.82rem;color:#777;line-height:1.6;margin-bottom:10px;position:relative;}
.pu-teaser::after{content:"";position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(transparent,#fff);}
.pu-picks-locked{background:#f8f8f8;border-radius:8px;padding:10px;text-align:center;margin-bottom:12px;}
.pu-picks-locked-label{font-size:.65rem;color:#aaa;margin-bottom:4px;}
.pu-picks-blur{font-size:1.3rem;font-weight:900;color:#ccc;filter:blur(4px);user-select:none;letter-spacing:.1em;}
.pu-buy-area{display:flex;gap:8px;flex-wrap:wrap;}
.btn-buy{flex:1;background:linear-gradient(135deg,var(--premium-gold),#f5d800);color:#000;font-weight:900;font-size:.82rem;padding:10px 8px;border-radius:20px;border:none;cursor:pointer;text-align:center;min-width:120px;}
.btn-buy-premium{flex:1;background:var(--main-blue);color:#fff;font-weight:bold;font-size:.78rem;padding:10px 8px;border-radius:20px;border:none;cursor:pointer;text-align:center;text-decoration:none;min-width:100px;}
.btn-login-req{flex:1;background:#f0f0f0;color:#666;font-size:.78rem;padding:10px;border-radius:20px;border:none;cursor:pointer;text-align:center;}
/* 購入済み状態 */
.pu-purchased-badge{background:#e8f5e9;color:#2e7d32;font-size:.65rem;font-weight:bold;padding:2px 8px;border-radius:8px;border:1px solid #c8e6c9;}
.pu-body-open{padding:0 14px 14px;}
.pu-full-text{font-size:.83rem;color:#333;line-height:1.7;margin-bottom:12px;}
.pu-picks-open{background:linear-gradient(135deg,#fff8e1,#fffde7);border:1px solid #ffe082;border-radius:10px;padding:12px;text-align:center;margin-bottom:10px;}
.pu-picks-open-label{font-size:.65rem;color:#aaa;margin-bottom:4px;}
.pu-picks-val{font-size:1.4rem;font-weight:900;color:#c8a400;letter-spacing:.1em;}
.pu-like-row{display:flex;gap:8px;padding-top:10px;border-top:1px solid #f5f5f5;}
.like-btn{background:none;border:1px solid #ddd;border-radius:16px;padding:5px 12px;font-size:.75rem;cursor:pointer;color:#666;transition:all .15s;}
.like-btn:hover,.like-btn.liked{background:#fff0f0;border-color:#ff7675;color:#c0392b;}
/* PREMIUMバナー */
.premium-free-banner{background:linear-gradient(135deg,rgba(200,164,0,.1),rgba(245,216,0,.06));border:1px solid rgba(200,164,0,.3);border-radius:10px;padding:12px;text-align:center;margin-bottom:16px;}
.no-pred{text-align:center;padding:32px 20px;color:#aaa;font-size:.85rem;}
.no-pred-icon{font-size:2rem;margin-bottom:8px;}

/* ── PRO USER プロフィール一覧 ── */
.pu-profiles-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:4px;}
.pu-profile-card{background:#fff;border-radius:14px;padding:16px 10px 12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.09);border:1px solid #eee;}
.pu-profile-avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid #e0e8f5;margin:0 auto 8px;display:block;}
.pu-profile-avatar-def{width:60px;height:60px;border-radius:50%;background:#e8edf5;display:flex;align-items:center;justify-content:center;font-size:1.6rem;border:3px solid #e0e8f5;margin:0 auto 8px;}
.pu-profile-name{font-weight:bold;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pu-profile-handle{font-size:.65rem;color:#aaa;margin-bottom:5px;}
.pu-profile-grade-badge{display:inline-block;color:#fff;font-size:.6rem;font-weight:bold;padding:2px 8px;border-radius:8px;margin-bottom:7px;}
.pu-profile-stats{display:flex;justify-content:center;gap:10px;font-size:.65rem;color:#888;margin-bottom:10px;}
.btn-detail{width:100%;background:var(--main-blue);color:#fff;border:none;border-radius:10px;padding:7px;font-size:.75rem;font-weight:bold;cursor:pointer;}
.pu-back-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid var(--main-blue);color:var(--main-blue);font-size:.78rem;font-weight:bold;cursor:pointer;padding:5px 12px;border-radius:16px;margin-bottom:12px;}
.pu-sort-bar{display:flex;gap:6px;margin-bottom:12px;}
.pu-sort-btn{flex:1;padding:7px 4px;border-radius:20px;border:1px solid #ddd;background:#f8f9fa;color:#555;font-size:.75rem;font-weight:bold;cursor:pointer;transition:all .2s;}
.pu-sort-btn.active{background:var(--main-blue);color:#fff;border-color:var(--main-blue);}
.pu-profile-detail-header{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);border:1px solid #eee;margin-bottom:12px;}

/* ── 実力7チャレンジ ── */
.ch7-panel{padding-bottom:20px;}
.ch7-hero{background:linear-gradient(135deg,#4a148c,#6a1b9a,#7b1fa2);border-radius:14px;padding:24px 20px;color:#fff;text-align:center;margin:14px 14px 0;}
.ch7-hero h2{font-size:1.5rem;font-weight:900;margin-bottom:6px;}
.ch7-hero p{font-size:.82rem;opacity:.9;line-height:1.5;}
.ch7-card{background:#fff;border-radius:14px;margin:12px 14px;box-shadow:0 2px 10px rgba(0,0,0,.1);overflow:hidden;}
.ch7-card-header{padding:16px 16px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.ch7-title{font-weight:900;font-size:1rem;color:#333;}
.ch7-prize-badge{background:linear-gradient(135deg,#4a148c,#7b1fa2);color:#fff;font-size:.78rem;font-weight:bold;padding:5px 12px;border-radius:20px;white-space:nowrap;}
.ch7-stats-row{display:flex;gap:0;padding:12px 16px;border-bottom:1px solid #f0f0f0;}
.ch7-stat{flex:1;text-align:center;}
.ch7-stat-val{font-size:1.25rem;font-weight:900;color:#6a1b9a;}
.ch7-stat-label{font-size:.62rem;color:#aaa;margin-top:2px;}
.ch7-how{padding:10px 16px;font-size:.75rem;color:#666;background:#faf5ff;line-height:1.6;border-bottom:1px solid #f0f0f0;}
.ch7-races{padding:10px 16px;}
.ch7-race-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5;}
.ch7-race-row:last-child{border-bottom:none;}
.ch7-race-label{font-size:.85rem;font-weight:bold;color:#333;flex:1;}
.ch7-select{padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:.82rem;background:#f8f0ff;color:#4a148c;font-weight:bold;outline:none;}
.ch7-submit-area{padding:0 16px 16px;}
.ch7-submit{width:100%;background:linear-gradient(135deg,#4a148c,#7b1fa2);color:#fff;font-weight:900;font-size:.9rem;padding:14px;border-radius:24px;border:none;cursor:pointer;display:block;text-align:center;text-decoration:none;}
.ch7-done-badge{text-align:center;background:#e8f5e9;color:#2e7d32;font-weight:bold;font-size:.85rem;padding:12px;border-radius:12px;margin-bottom:8px;}
.ch7-premium-cta{display:block;text-align:center;background:linear-gradient(135deg,#c8a400,#e8c200);color:#000;font-weight:bold;font-size:.82rem;padding:10px;border-radius:20px;text-decoration:none;}
.ch7-my-entries{background:#fff;border-radius:12px;margin:0 14px 14px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.08);border:1px solid #eee;}
.ch7-my-entries-title{font-weight:bold;font-size:.85rem;color:#333;margin-bottom:10px;}
.ch7-entry-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:.78rem;}
.ch7-entry-row:last-child{border-bottom:none;}
.ch7-entry-num{background:#f0e6ff;color:#6a1b9a;font-weight:bold;padding:2px 8px;border-radius:8px;font-size:.72rem;flex-shrink:0;}
.ch7-entry-preds{flex:1;color:#333;font-family:monospace;letter-spacing:.05em;}
.ch7-entry-date{color:#aaa;font-size:.68rem;flex-shrink:0;}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;display:flex;z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.1);}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;text-decoration:none;color:#999;font-size:.58rem;gap:2px;}
.bottom-nav a.active{color:var(--main-blue);}
.bottom-nav-icon{font-size:1.2rem;}

footer{text-align:center;padding:30px 10px 10px;font-size:.65rem;color:#bbb;}
footer a{color:#ccc;text-decoration:none;}
</style>
</head>

/* ── 会場リスト（アコーディオン） ── */
function renderVenues() {
  const data = RK.getData();
  const el = document.getElementById('venue-list');

  /* data.races をvenue名でグルーピング */
  const venueRaces = {}; /* venue名 → [{raceId, ...race}] */
  Object.entries(data.races || {}).forEach(([raceId, race]) => {
    if (!venueRaces[race.venue]) venueRaces[race.venue] = [];
    venueRaces[race.venue].push({ raceId, ...race });
  });

  /* data.venues からイベント情報マップ */
  const venueInfoMap = {};
  (data.venues || []).forEach(v => { venueInfoMap[v.name] = v; });

  /* レースがある会場を raceNum 昇順でソート */
  const entries = Object.keys(venueRaces).map(vname => ({
    vname,
    vinfo: venueInfoMap[vname] || {},
    races: venueRaces[vname].slice().sort((a, b) => a.raceNum - b.raceNum)
  }));

  /* data.venues のみの会場（レース未登録）も追加 */
  (data.venues || []).forEach(v => {
    if (!venueRaces[v.name]) entries.push({ vname: v.name, vinfo: v, races: [] });
  });

  if (entries.length === 0) {
    el.innerHTML = '<p style="text-align:center;color:#aaa;padding:20px;font-size:.85rem;">開催中のレースはありません</p>';
    return;
  }

  el.innerHTML = entries.map(({ vname, vinfo, races }) => {
    const eventName = vinfo.event || '';
    const grade     = vinfo.grade || (races[0]?.grade || '');
    const countText = races.length > 0 ? `${races.length}レース` : 'レース情報なし';

    const racesHtml = races.length === 0
      ? '<p style="padding:12px 14px;color:#aaa;font-size:.8rem;">レース情報はありません</p>'
      : races.map(r => `
        <a href="race.html?id=${r.raceId}" class="venue-race-link">
          <span class="venue-race-num">${r.raceNum}R</span>
          <span class="venue-race-cat">${r.category}${r.distance ? '　' + r.distance : ''}</span>
          <span class="venue-race-deadline">締切 ${r.deadline}</span>
          <span class="venue-race-arrow">›</span>
        </a>`).join('');

    return `
      <div class="venue-card">
        <div class="venue-card-header" onclick="toggleVenue(this)">
          <span class="venue-name-badge">${vname}</span>
          <div class="venue-header-info">
            <div class="venue-event-name">${eventName || grade}</div>
            <div class="venue-grade-label">${grade}${eventName ? '　' + countText : countText}</div>
          </div>
          <span class="venue-toggle-arrow">›</span>
        </div>
        <div class="venue-races-list">${racesHtml}</div>
      </div>`;
  }).join('');
}

function toggleVenue(header) {
  const arrow = header.querySelector('.venue-toggle-arrow');
  const list  = header.nextElementSibling;
  const open  = list.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

/* ── PRO USER予想 ── */
let _puView = 'list';
let _puSelectedId = null;
let _puSort = 'grade'; /* 'grade' | 'latest' */

function renderProUser() {
  if (_puView === 'detail' && _puSelectedId) renderProUserDetail(_puSelectedId);
  else renderProUserList();
}
function showPuDetail(puId) { _puView = 'detail'; _puSelectedId = puId; renderProUser(); }
function backToPuList()     { _puView = 'list';   _puSelectedId = null; renderProUser(); }
function setPuSort(s)       { _puSort = s; renderProUserList(); }

function _puGradeBg(grade) {
  if (!grade) return 'linear-gradient(135deg,#757575,#9e9e9e)';
  if (grade.startsWith('SS')) return 'linear-gradient(135deg,#b8860b,#ffd700)';
  if (grade.startsWith('S'))  return 'linear-gradient(135deg,var(--main-blue),#1a5fb4)';
  if (grade.startsWith('A'))  return 'linear-gradient(135deg,#2e7d32,#388e3c)';
  if (grade.startsWith('B'))  return 'linear-gradient(135deg,#e65100,#f57c00)';
  return 'linear-gradient(135deg,#757575,#9e9e9e)';
}

function renderProUserList() {
  const el          = document.getElementById('pro-user-content');
  const isPremium   = RK.isPremium();
  const currentUser = RK.getUser();
  const myPoints    = RK.getPoints();
  const data        = RK.getData();
  const puList      = RK.getRKProUsers();

  /* ── ソート ── */
  const GRADE_RANK = {'S級 PRO USER':1,'A級 PRO USER':2,'B級 PRO USER':3,'新人 PRO USER':4};

  /* 各PRO USERの最新予想投稿タイムスタンプ（id = 'up_TIMESTAMP'） */
  const latestTs = {};
  Object.values(data.races).forEach(race => {
    (race.userPredictions || []).forEach(p => {
      const ts = parseInt((p.id || '').replace('up_', ''), 10) || 0;
      if (!latestTs[p.proUserId] || ts > latestTs[p.proUserId]) latestTs[p.proUserId] = ts;
    });
  });

  const sorted = [...puList].sort((a, b) => {
    if (_puSort === 'grade') {
      const ra = GRADE_RANK[a.grade] ?? 99;
      const rb = GRADE_RANK[b.grade] ?? 99;
      return ra !== rb ? ra - rb : (b.winRate || 0) - (a.winRate || 0);
    } else {
      /* latest: 予想投稿が新しい順。未投稿は末尾 */
      const ta = latestTs[a.id] || 0;
      const tb = latestTs[b.id] || 0;
      return tb - ta;
    }
  });

  const premiumBannerHtml = isPremium ? '' : `
    <div class="premium-free-banner">
      <p>👑 <strong>PREMIUM会員</strong>は毎月<strong>1,000 ROOT POINT</strong>が進呈されます！<br>
      ポイントはPRO USER予想の購入に使えます。1pt = 1円でも購入可能。</p>
      <a href="premium.html" style="display:inline-block;background:linear-gradient(135deg,#c8a400,#f5d800);color:#000;font-weight:bold;padding:8px 20px;border-radius:20px;text-decoration:none;font-size:.82rem;">PREMIUMに登録する</a>
    </div>`;

  const sortBarHtml = `
    <div class="pu-sort-bar">
      <button class="pu-sort-btn${_puSort==='grade'?' active':''}" onclick="setPuSort('grade')">グレード順</button>
      <button class="pu-sort-btn${_puSort==='latest'?' active':''}" onclick="setPuSort('latest')">最新予想順</button>
    </div>`;

  let gridHtml = '';
  if (sorted.length === 0) {
    gridHtml = `<div class="no-pred"><div class="no-pred-icon">💬</div><p>現在PRO USERはいません</p></div>`;
  } else {
    gridHtml = `<div class="pu-profiles-grid">` +
      sorted.map(pu => {
        const avatarHtml = pu.avatarImg
          ? `<img src="${pu.avatarImg}" class="pu-profile-avatar" alt="">`
          : `<div class="pu-profile-avatar-def">👤</div>`;
        const bg = _puGradeBg(pu.grade);
        return `
          <div class="pu-profile-card">
            ${avatarHtml}
            <div class="pu-profile-name">${pu.userName}</div>
            <div class="pu-profile-handle">@${pu.handle}</div>
            <span class="pu-profile-grade-badge" style="background:${bg}">${pu.grade}</span>
            <div class="pu-profile-stats">
              <span>的中率 ${pu.winRate}%</span>
              <span>投稿 ${pu.postCount}件</span>
            </div>
            <button class="btn-detail" onclick="showPuDetail('${pu.id}')">詳細を見る</button>
          </div>`;
      }).join('') +
    `</div>`;
  }

  el.innerHTML = `
    <div class="pro-user-top">
      <h2>👥 PRO USER予想</h2>
      ${currentUser ? `<div class="my-point-badge">💎 ${myPoints.toLocaleString()} pt</div>` : ''}
    </div>
    <div class="pro-user-what">
      <strong>PRO USER予想とは？</strong><br>
      ROOT競輪が認定した高実績の予想師のみが投稿できる有料コンテンツです。<br>
      ROOT POINTを使って個別に購入できます。1pt = 1円で購入可能。PREMIUM会員は毎月1,000ptが進呈されます。
    </div>
    ${premiumBannerHtml}
    ${sortBarHtml}
    ${gridHtml}`;
}

function renderProUserDetail(puId) {
  const el          = document.getElementById('pro-user-content');
  const data        = RK.getData();
  const currentUser = RK.getUser();
  const purchased   = RK.getPurchasedSet();
  const myPoints    = RK.getPoints();
  const puList      = RK.getRKProUsers();
  const pu          = puList.find(p => p.id === puId);

  if (!pu) { backToPuList(); return; }

  const bg = _puGradeBg(pu.grade);
  const avatarHtml = pu.avatarImg
    ? `<img src="${pu.avatarImg}" class="pu-profile-avatar" style="width:52px;height:52px;" alt="">`
    : `<div class="pu-profile-avatar-def" style="width:52px;height:52px;font-size:1.4rem;">👤</div>`;

  const profileHeaderHtml = `
    <div class="pu-profile-detail-header">
      ${avatarHtml}
      <div style="flex:1;min-width:0;">
        <div style="font-weight:bold;font-size:.95rem;">${pu.userName}</div>
        <div style="font-size:.65rem;color:#aaa;margin-bottom:4px;">@${pu.handle}</div>
        <span class="pu-profile-grade-badge" style="background:${bg}">${pu.grade}</span>
      </div>
      <div style="text-align:right;font-size:.7rem;color:#888;">
        <div>的中率 <strong>${pu.winRate}%</strong></div>
        <div>投稿 <strong>${pu.postCount}件</strong></div>
      </div>
    </div>`;

  /* 全レースからこのPRO USERの予想だけ収集 */
  const groups = [];
  Object.entries(data.races).forEach(([raceId, race]) => {
    if (!race.userPredictions) return;
    const preds = race.userPredictions.filter(p => p.proUserId === puId || p.handle === pu.handle);
    if (preds.length > 0) groups.push({ raceId, race, preds });
  });

  function buildPuCard(u, raceId) {
    const isOpen     = purchased.has(u.id);
    const gradeClass = u.grade.startsWith('A') ? 'a' : '';

    const headHtml = `
      <div class="pu-card-head">
        <div class="avatar" style="background:${u.avatarColor||'#0047AB'};color:#fff;">${u.avatarLetter||'?'}</div>
        <div class="pu-user-info">
          <div class="pu-user-name">${u.userName}<span class="pu-grade ${gradeClass}">${u.grade}</span></div>
          <div class="pu-user-sub">${u.handle}　的中率 ${u.winRate}%　投稿 ${u.postCount}件</div>
        </div>
        <div class="pu-price-tag">
          ${isOpen
            ? `<span class="pu-purchased-badge">購入済み</span>`
            : `<div class="pu-pt">${u.pointPrice}<small style="font-size:.55rem;"> pt</small></div>
               <div class="pu-pt-label">ROOT POINT</div>`}
        </div>
      </div>`;

    if (isOpen) {
      return `<div class="pu-card">
        ${headHtml}
        <div class="pu-body-open">
          <div class="pu-full-text">${u.text}</div>
          <div class="pu-picks-open">
            <div class="pu-picks-open-label">推奨買い目</div>
            <div class="pu-picks-val">${u.picks}</div>
          </div>
          <div class="pu-like-row">
            <button class="like-btn" onclick="toggleLike(this)">👍 いいね ${u.likes}</button>
          </div>
        </div>
      </div>`;
    }

    let buyAreaHtml = '';
    if (!currentUser) {
      buyAreaHtml = `<button class="btn-login-req" onclick="location.href='login.html?redirect='+encodeURIComponent(location.href)">ログインして購入する</button>`;
    } else {
      buyAreaHtml = `
        <button class="btn-buy" onclick="doPurchase('${raceId}','${u.id}',${u.pointPrice})">
          💎 購入する（${u.pointPrice}pt）
        </button>
        <a href="premium.html" class="btn-buy-premium">👑 PREMIUM会員になる</a>`;
    }

    return `<div class="pu-card">
      ${headHtml}
      <div class="pu-body-locked">
        <div class="pu-teaser">${u.teaser || u.text.substring(0, 45) + '...'}</div>
        <div class="pu-picks-locked">
          <div class="pu-picks-locked-label">推奨買い目</div>
          <div class="pu-picks-blur">??-??-??</div>
        </div>
        <div class="pu-buy-area">${buyAreaHtml}</div>
      </div>
    </div>`;
  }

  let predsHtml = '';
  if (groups.length === 0) {
    predsHtml = `<div class="no-pred"><div class="no-pred-icon">💬</div><p>現在公開中の予想はありません</p></div>`;
  } else {
    groups.forEach(({ raceId, race, preds }) => {
      predsHtml += `
        <div class="race-group-header">
          <a href="race.html?id=${raceId}">${race.venue} ${race.raceNum}R ›</a>
          <span>${race.grade}　${race.category}</span>
        </div>
        ${preds.map(u => buildPuCard(u, raceId)).join('')}`;
    });
  }

  el.innerHTML = `
    <div class="pro-user-top">
      <h2>👥 PRO USER予想</h2>
      ${currentUser ? `<div class="my-point-badge">💎 ${myPoints.toLocaleString()} pt</div>` : ''}
    </div>
    <button class="pu-back-btn" onclick="backToPuList()">← 一覧に戻る</button>
    ${profileHeaderHtml}
    ${predsHtml}`;
}

/* ── 購入処理 ── */
function doPurchase(raceId, predId, cost) {
  const result = RK.purchasePred(predId, cost);
  if (result === 'no_login') {
    location.href = 'login.html?redirect=' + encodeURIComponent(location.href);
    return;
  }
  if (result === 'no_points') {
    const shortage = cost - RK.getPoints();
    if (confirm(`ROOT POINTが不足しています（不足: ${shortage}pt）\n\n1pt = 1円でポイントを購入できます。\nPREMIUM会員は毎月1,000ptが進呈されてお得！\nPREMIUMページを開きますか？`)) {
      location.href = 'premium.html';
    }
    return;
  }
  renderProUser();
}

/* ── いいねボタン ── */
function toggleLike(btn) {
  btn.classList.toggle('liked');
  const m = btn.textContent.match(/(\d+)/);
  if (m) {
    const n = btn.classList.contains('liked') ? +m[1]+1 : +m[1]-1;
    btn.textContent = `👍 いいね ${n}`;
  }
}

          <div class="ch7-stat"><div class="ch7-stat-val">${openChallenge.races.length}</div><div class="ch7-stat-label">対象レース</div></div>
          <div class="ch7-stat"><div class="ch7-stat-val">${(openChallenge.prizePool || 0).toLocaleString()}</div><div class="ch7-stat-label">賞金(pt)</div></div>
        </div>
        <div class="ch7-how">
          <strong>ルール：</strong>各レースの1着車番を予想。全問正解者で賞金ポイントを山分け！<br>
          通常ユーザーは1日1予想・PREMIUM会員は1チャレンジ20通りまで予想可能。
        </div>
        <div style="margin-top:8px;padding:8px 12px;background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.25);border-radius:8px;font-size:.72rem;color:#f85149;line-height:1.7;">
          ⚠️ 不正行為と運営が判断した場合、アカウントが停止される可能性があります。
        </div>
        <div class="ch7-races">${raceRows}</div>
        <div class="ch7-submit-area">${submitArea}</div>
      </div>
      ${myEntriesHtml}`;

  } else if (closedChallenge) {
    /* 受付終了・判定待ち */
    const myEntries = user ? (closedChallenge.entries || []).filter(e => e.email === user.email) : [];

    const raceRows = closedChallenge.races.map((r, i) => `
      <div class="ch7-race-row">
        <span style="font-size:.75rem;color:#aaa;width:20px;">${i + 1}</span>
        <span style="font-size:.85rem;flex:1;">${r.label}</span>
        <span style="font-size:.75rem;color:#bbb;">判定待ち</span>
      </div>`).join('');

    const myEntriesHtml = myEntries.length > 0 ? `
      <div class="ch7-my-entries">
        <div class="ch7-my-entries-title">📋 あなたの予想 (${myEntries.length}通り)</div>
        ${myEntries.map((e, i) => `
          <div class="ch7-entry-row">
            <span class="ch7-entry-num">#${e.entryNum || i + 1}</span>
            <span class="ch7-entry-preds">${e.predictions.join(' - ')}</span>
            <span class="ch7-entry-date">${(e.submittedAt || '').slice(5, 16)}</span>
          </div>`).join('')}
      </div>` : `
      <div style="text-align:center;padding:16px 14px;color:#aaa;font-size:.82rem;">
        このチャレンジへの予想はありません
      </div>`;

    el.innerHTML = heroHtml + `
      <div class="ch7-card">
        <div class="ch7-card-header">
          <div class="ch7-title">${closedChallenge.title || '実力7チャレンジ'}</div>
          <span style="background:#fff3e0;color:#e65100;font-size:.7rem;font-weight:bold;padding:3px 10px;border-radius:12px;">⏳ 判定待ち</span>
        </div>
        <div class="ch7-stats-row">
          <div class="ch7-stat"><div class="ch7-stat-val">${(closedChallenge.entries || []).length}</div><div class="ch7-stat-label">総エントリー</div></div>
          <div class="ch7-stat"><div class="ch7-stat-val">${closedChallenge.races.length}</div><div class="ch7-stat-label">対象レース</div></div>
          <div class="ch7-stat"><div class="ch7-stat-val">${(closedChallenge.prizePool || 0).toLocaleString()}</div><div class="ch7-stat-label">賞金(pt)</div></div>
        </div>
        <div class="ch7-how" style="background:#fff8f0;border-color:#ffe0cc;">
          受付は終了しました。管理者による結果判定をお待ちください。<br>
          全問正解者で <strong>${(closedChallenge.prizePool || 0).toLocaleString()} pt</strong> を山分けします。
        </div>
        <div class="ch7-races">${raceRows}</div>
      </div>
      ${myEntriesHtml}`;

  } else if (latestJudged) {
    const myEntries = user ? (latestJudged.entries || []).filter(e => e.email === user.email) : [];
    const isWinner  = user && (latestJudged.winners || []).includes(user.email);

    const raceResults = latestJudged.races.map((r, i) => `
      <div class="ch7-race-row">
        <span style="font-size:.75rem;color:#aaa;width:20px;">${i + 1}</span>
        <span style="font-size:.85rem;flex:1;">${r.label}</span>
        <span style="font-size:.88rem;font-weight:900;color:#6a1b9a;background:#f0e6ff;padding:4px 12px;border-radius:8px;">
          ${r.winner !== null && r.winner !== undefined ? r.winner + '番' : '---'}
        </span>
      </div>`).join('');

    let myResultHtml = '';
    if (myEntries.length > 0) {
      const best = myEntries.reduce((b, e) => {
        const sc = e.predictions.filter((p, i) => parseInt(p) === latestJudged.races[i].winner).length;
        const bs = b.predictions.filter((p, i) => parseInt(p) === latestJudged.races[i].winner).length;
        return sc > bs ? e : b;
      }, myEntries[0]);
      const correctCount = best.predictions.filter((p, i) => parseInt(p) === latestJudged.races[i].winner).length;
      myResultHtml = `
        <div style="margin:0 14px 14px;background:${isWinner ? 'linear-gradient(135deg,#4a148c,#7b1fa2)' : '#f5f5f5'};border-radius:12px;padding:16px;color:${isWinner ? '#fff' : '#333'};">
          ${isWinner ? `
            <div style="font-size:1.5rem;text-align:center;margin-bottom:6px;">🏆</div>
            <div style="font-weight:900;font-size:1rem;text-align:center;">全問正解！当選おめでとうございます</div>
            <div style="text-align:center;font-size:.82rem;margin-top:6px;opacity:.9;">賞金 ${(latestJudged.prizePerWinner || 0).toLocaleString()} pt が付与されます</div>
          ` : `
            <div style="font-weight:bold;font-size:.88rem;">あなたの最高成績: ${correctCount} / ${latestJudged.races.length} 問正解</div>
            <div style="font-size:.75rem;margin-top:4px;color:#888;">（${myEntries.length}通り中のベスト）</div>
          `}
        </div>`;
    }

    el.innerHTML = heroHtml + `
      <div class="ch7-card">
        <div class="ch7-card-header">
          <div class="ch7-title">${latestJudged.title || '実力7チャレンジ'} — 結果</div>
          <span style="background:#e8f5e9;color:#2e7d32;font-size:.7rem;font-weight:bold;padding:3px 10px;border-radius:12px;">判定済み</span>
        </div>
        <div class="ch7-stats-row">
          <div class="ch7-stat"><div class="ch7-stat-val">${(latestJudged.entries || []).length}</div><div class="ch7-stat-label">総エントリー</div></div>
          <div class="ch7-stat"><div class="ch7-stat-val">${(latestJudged.winners || []).length}</div><div class="ch7-stat-label">当選者数</div></div>
          <div class="ch7-stat"><div class="ch7-stat-val">${(latestJudged.prizePerWinner || 0).toLocaleString()}</div><div class="ch7-stat-label">賞金/人(pt)</div></div>
        </div>
        <div class="ch7-races">${raceResults}</div>
      </div>
      ${myResultHtml}`;
  }
}

function submitChallenge7() {
  const challenge = RK.getActiveChallenge7();
  if (!challenge) return;
  const predictions = [];
  for (let i = 0; i < challenge.races.length; i++) {
    const val = document.getElementById('ch7-pick-' + i)?.value;
    if (!val) { alert(`レース${i + 1}の1着を選んでください`); return; }
    predictions.push(parseInt(val));
  }
  const result = RK.submitChallenge7Entry(challenge.id, predictions);
  if (result.ok) {
    alert(`✓ 予想を送信しました！（${result.entryNum}通り目）`);
    renderChallenge7();
  } else {
    alert(result.msg);
  }
}

/* ── マイページリンク ── */
const user = RK.getUser();
if (user) {
  const link = document.getElementById('mypage-link');
  link.href = 'mypage.html';
  document.getElementById('mypage-label').textContent = user.name;
  /* 未読お知らせバッジ */
  const unread = RK.getUnreadCount(user.email || '');
  if (unread > 0) {
    const dot = document.createElement('span');
    dot.style.cssText = 'position:absolute;top:4px;right:4px;width:8px;height:8px;background:#ff3b3b;border-radius:50%;';
    link.style.position = 'relative';
    link.appendChild(dot);
  }
}

/* ── 初期描画 ── */
(async () => {
  await RK.init();
  renderNextRaces();
  renderVenues();
  renderProAi();
  renderProUser();
  renderChallenge7();
})();

if (_tabParam) showTab(_tabParam);
